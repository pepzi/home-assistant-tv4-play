play_suggested:
  name: "Play suggested"
  description: "Play the suggested/latest episode of a program"
  fields:
    entity_id:
      name: "Media player"
      description: "The media player entity to play on"
      required: true
      selector:
        entity:
          domain: media_player
    program_id:
      name: "Program ID"
      description: "The program ID from TV4 Play"
      required: false
      selector:
        text:
    config_entry:
      name: "Config Entry ID"
      description: "The config entry ID of the TV4 Play integration"
      required: true
      selector:
        text:

play_video:
  name: "Play video"
  description: "Play a specific TV4 Play video by video_id"
  fields:
    entity_id:
      name: "Media player"
      description: "The media player entity to play on"
      required: true
      selector:
        entity:
          domain: media_player
    video_id:
      name: "Video ID"
      description: "The video ID from TV4 Play (the part after /video/ in the URL)"
      required: true
      selector:
        text:
    config_entry:
      name: "Config Entry ID"
      description: "The config entry ID of the TV4 Play integration"
      required: true
      selector:
        text:
